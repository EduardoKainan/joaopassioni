  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passioni Advocacia | Recuperação de Contas Bloqueadas</title>
  <meta name="description"
    content="Sua conta do Instagram, Facebook ou WhatsApp foi bloqueada? Recupere seu acesso com especialistas em Direito Digital. Atendimento 100% online em todo o Brasil." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --primary: #ffffff;
      --secondary: #d4af37;
      --text-main: #0a192f;
      --text-muted: #4b5563;
      --white: #0a192f;
      --real-white: #ffffff;
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--primary);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
    }

    h1,
    h2,
    h3 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      padding: 15px 0;
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-img {
      height: 60px;
      width: auto;
      display: block;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: url('/hero-bg.webp') no-repeat center center/cover;
      padding-top: 100px;
      padding-bottom: 50px;
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to right, rgba(255, 255, 255, 0.98) 40%, rgba(255, 255, 255, 0.7));
    }

    .hero-content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      align-items: flex-start;
      gap: 20px 50px;
    }

    .badge-expert {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(212, 175, 55, 0.15);
      color: var(--secondary);
      border: 1px solid var(--secondary);
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 25px;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      line-height: 1.1;
      margin-bottom: 25px;
      color: var(--white);
    }
  </style>
